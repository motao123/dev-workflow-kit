name: Bug report
description: Report incorrect skill behavior, docs issues, or routing/eval inconsistencies
labels: [bug]
body:
  - type: input
    id: affected_area
    attributes:
      label: Affected skill or file
      description: Name the skill or root file affected.
      placeholder: systematic-debugging / README.md / SKILL.md
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Issue category
      options:
        - SKILL.md behavior
        - README.md docs
        - evals
        - examples
        - router/catalog consistency
        - other
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: The skill should route to fix-ci when the failure is clearly pipeline-only.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: The guidance routed to systematic-debugging instead of fix-ci.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction prompt or input
      description: Provide the exact prompt, invocation, or content that shows the problem.
      placeholder: |
        Use fix-ci instead of general debugging because the only failure is in the pipeline type-check job.
    validations:
      required: true

  - type: textarea
    id: files
    attributes:
      label: Relevant files (optional)
      description: List any files you think are related.
      placeholder: |
        - SKILL.md
        - evals/evals.json
        - fix-ci/SKILL.md

  - type: textarea
    id: notes
    attributes:
      label: Extra context, screenshots, or logs (optional)
      description: Add any supporting information.
